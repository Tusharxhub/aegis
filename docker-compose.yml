services:
  postgres:
    image: postgres:latest
    container_name: aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_password}
      POSTGRES_DB: ${POSTGRES_DB:-aegis_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aegis-network

  redis:
    image: redis:alpine
    container_name: aegis-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aegis-network

  ollama:
    image: ollama/ollama:latest
    container_name: aegis-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    networks:
      - aegis-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  aegis-network:
    driver: bridge