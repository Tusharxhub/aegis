version: '3.8'

services:
  # 1. Relational Database & State Cache (Redis)
  aegis-redis:
    image: redis:7.0-alpine
    container_name: aegis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. Custom AI Inference Engine (Python Sentence-Transformers & FAISS)
  aegis-ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    container_name: aegis-ai-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      - ai_model_store:/app/models
      - ai_vector_store:/app/vectorstore/storage
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. SRE Orchestrator (NestJS)
  aegis-nestjs:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-nestjs
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=3001
      - REDIS_URL=redis://aegis-redis:6379
      - AI_ENGINE_URL=http://aegis-ai-engine:8000
      - DATABASE_URL=${DATABASE_URL}
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      aegis-redis:
        condition: service_healthy
      aegis-ai-engine:
        condition: service_healthy
    networks:
      - aegis-network

  # 4. Cinematic Dashboard (Next.js 15)
  aegis-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aegis-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - aegis-nestjs
    networks:
      - aegis-network

  # 5. Intentional Demo Crash Service (OOM Crash Simulator)
  aegis-demo-crash:
    image: alpine:latest
    container_name: aegis-demo-crash
    restart: unless-stopped
    # cat /dev/zero generates infinite byte streams causing instant OOM under memory constraints
    command: sh -c "echo '✨ Simulating memory heavy worker...'; sleep 60; cat /dev/zero"
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - aegis-network

volumes:
  redis_data:
    driver: local
  ai_model_store:
    driver: local
  ai_vector_store:
    driver: local

networks:
  aegis-network:
    driver: bridge
    name: aegis-network