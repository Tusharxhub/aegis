# ─────────────────────────────────────────────────────────────────────────────
# Project Aegis — Docker Compose
# Only the Ollama inference container is orchestrated here.
# Postgres is handled by Neon DB (serverless) and Redis by Upstash (serverless).
# ─────────────────────────────────────────────────────────────────────────────

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aegis-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "4"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
        limits:
          memory: 16G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - aegis-network

volumes:
  ollama_data:
    driver: local

networks:
  aegis-network:
    driver: bridge
    name: aegis-network