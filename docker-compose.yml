version: '3.8'

services:
  # 1. State Cache (Redis) — configured for BullMQ queue workloads
  aegis-redis:
    image: redis:7.0-alpine
    container_name: aegis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. Infrastructure Ledger (MongoDB)
  aegis-mongodb:
    image: mongo:6.0
    container_name: aegis-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infrastructure/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - aegis-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Kafka Event Backbone (KRaft mode — no Zookeeper)
  aegis-kafka:
    image: bitnami/kafka:latest
    container_name: aegis-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    env_file:
      - ./infrastructure/kafka/broker.env
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # 4. Kafka UI (optional, local operator console)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aegis-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=aegis-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=aegis-kafka:9092
    depends_on:
      - aegis-kafka
    networks:
      - aegis-network

  # 5. AI Inference Engine (Python — SentenceTransformers + FAISS + Kafka)
  aegis-ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    container_name: aegis-ai-engine
    restart: unless-stopped
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - MONGODB_URI=mongodb://aegis-mongodb:27017/aegis
      - KAFKA_BROKER=aegis-kafka:9092
    volumes:
      - ai_model_store:/app/models
      - ai_vector_store:/app/vectorstore/storage
    depends_on:
      aegis-kafka:
        condition: service_healthy
      aegis-mongodb:
        condition: service_healthy
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # 6. SRE Orchestrator (NestJS)
  aegis-nestjs:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-nestjs
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=3001
      - REDIS_URL=redis://aegis-redis:6379
      - KAFKA_BROKER=aegis-kafka:9092
      - KAFKA_CLIENT_ID=aegis-orchestrator
      - KAFKA_GROUP_ID=aegis-backend-group
      - KAFKA_SSL=false
      - AI_ENGINE_URL=http://aegis-ai-engine:8000
      - MONGODB_URI=mongodb://aegis-mongodb:27017/aegis
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      aegis-redis:
        condition: service_healthy
      aegis-kafka:
        condition: service_started
      aegis-ai-engine:
        condition: service_healthy
      aegis-mongodb:
        condition: service_healthy
    networks:
      - aegis-network

  # 7. Intentional Demo Crash Service (Chaos Engineering)
  demo-crash-service:
    build:
      context: ./services/demo-crash-service
      dockerfile: Dockerfile
    container_name: demo-crash-service
    restart: unless-stopped
    ports:
      - "3002:3000"
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - aegis-network

volumes:
  redis_data:
    driver: local
  mongo_data:
    driver: local
  kafka_data:
    driver: local
  ai_model_store:
    driver: local
  ai_vector_store:
    driver: local

networks:
  aegis-network:
    driver: bridge
    name: aegis-network