version: '3.8'

services:
  # 1. Relational Database & State Cache (Redis)
  aegis-redis:
    image: redis:7.0-alpine
    container_name: aegis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. Replay Buffer Database (MongoDB)
  aegis-mongo:
    image: mongo:6.0
    container_name: aegis-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - aegis-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Kafka Event Backbone (KRaft)
  aegis-kafka:
    image: bitnami/kafka:latest
    container_name: aegis-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@aegis-kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://aegis-kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CFG_MIN_INSYNC_REPLICAS=1
      - KAFKA_CFG_LOG_DIRS=/bitnami/kafka/data
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - aegis-network

  # 4. Kafka UI (optional, local operator console)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aegis-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=aegis-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=aegis-kafka:9092
    depends_on:
      - aegis-kafka
    networks:
      - aegis-network

  # 5. Custom AI Inference Engine (Python Sentence-Transformers & FAISS)
  aegis-ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    container_name: aegis-ai-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://aegis-mongo:27017/aegis
    volumes:
      - ai_model_store:/app/models
      - ai_vector_store:/app/vectorstore/storage
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. SRE Orchestrator (NestJS)
  aegis-nestjs:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-nestjs
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=3001
      - REDIS_URL=redis://aegis-redis:6379
      - KAFKA_BROKER=aegis-kafka:9092
      - KAFKA_CLIENT_ID=aegis-orchestrator
      - KAFKA_GROUP_ID=aegis-backend-group
      - KAFKA_SSL=false
      - AI_ENGINE_URL=http://aegis-ai-engine:8000
      - MONGO_URI=mongodb://aegis-mongo:27017/aegis
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      aegis-redis:
        condition: service_healthy
      aegis-kafka:
        condition: service_started
      aegis-ai-engine:
        condition: service_healthy
      aegis-mongo:
        condition: service_started
    networks:
      - aegis-network

  # 6. Intentional Demo Crash Service (Chaos Engineering)
  demo-crash-service:
    build:
      context: ./services/demo-crash-service
      dockerfile: Dockerfile
    container_name: demo-crash-service
    restart: unless-stopped
    ports:
      - "3002:3000"
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - aegis-network

volumes:
  redis_data:
    driver: local
  mongo_data:
    driver: local
  kafka_data:
    driver: local
  ai_model_store:
    driver: local
  ai_vector_store:
    driver: local

networks:
  aegis-network:
    driver: bridge
    name: aegis-network