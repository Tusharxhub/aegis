services:
  # 1. State Cache (Redis) — configured for BullMQ queue workloads
  aegis-redis:
    image: redis:7.0-alpine
    container_name: aegis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --maxmemory-policy noeviction
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. Infrastructure Ledger (MongoDB)
  aegis-mongodb:
    image: mongo:7
    container_name: aegis-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=aegis
    volumes:
      - aegis_mongo_data:/data/db
      - ./infrastructure/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Kafka Event Backbone (KRaft mode — no Zookeeper)
  aegis-kafka:
    image: apache/kafka:4.2.1
    container_name: aegis-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@aegis-kafka:9093
      - KAFKA_LISTENERS=INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://aegis-kafka:19092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    networks:
      - aegis-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # 4. AI Inference Engine (Python — SentenceTransformers + FAISS + Kafka)
  aegis-ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    container_name: aegis-ai-engine
    restart: unless-stopped
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - MONGODB_URI=mongodb://aegis-mongodb:27017/aegis
      - KAFKA_BROKER=aegis-kafka:19092
    volumes:
      - ai_model_store:/app/models
      - ai_vector_store:/app/vectorstore/storage
    depends_on:
      aegis-kafka:
        condition: service_healthy
      aegis-mongodb:
        condition: service_healthy
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # 5. SRE Orchestrator (NestJS)
  aegis-nestjs:
    build:
      context: ./apps/control-plane
      dockerfile: Dockerfile
    container_name: aegis-control-plane
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=3001
      - REDIS_URL=redis://aegis-redis:6379
      - KAFKA_BROKER=aegis-kafka:19092
      - KAFKA_CLIENT_ID=aegis-orchestrator
      - KAFKA_GROUP_ID=aegis-backend-group
      - KAFKA_SSL=false
      - AI_ENGINE_URL=http://aegis-ai-engine:8000
      - MONGODB_URI=mongodb://aegis-mongodb:27017/aegis
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      aegis-redis:
        condition: service_healthy
      aegis-kafka:
        condition: service_started
      aegis-ai-engine:
        condition: service_healthy
      aegis-mongodb:
        condition: service_healthy
    networks:
      - aegis-network

volumes:
  redis_data:
    driver: local
  aegis_mongo_data:
    driver: local
  ai_model_store:
    driver: local
  ai_vector_store:
    driver: local

networks:
  aegis-network:
    driver: bridge
    name: aegis-network
