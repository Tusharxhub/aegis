# Project Aegis — Redis Configuration
# Tuned for BullMQ job queue workloads.

# Network
bind 0.0.0.0
protected-mode no
port 6379

# Persistence — RDB snapshots for queue durability
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF — append-only file for job durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory management
# BullMQ jobs are short-lived. Preserve queue state and avoid eviction.
maxmemory 256mb
maxmemory-policy noeviction

# Slow log — log queries taking > 10ms for operational visibility
slowlog-log-slower-than 10000
slowlog-max-len 128

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command CONFIG ""

# Connection limits
maxclients 100
timeout 300
tcp-keepalive 60

# Logging
loglevel notice
logfile ""
