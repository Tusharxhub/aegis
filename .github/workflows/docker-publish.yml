# ─────────────────────────────────────────────────────────────────────────────
# Project Aegis — Docker Publish
# Builds and pushes Docker images on pushes to main (latest tag)
# ─────────────────────────────────────────────────────────────────────────────
name: Docker Publish

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  publish-latest:
    name: Publish Latest Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AI Engine (latest)
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-engine
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/ai-engine:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/ai-engine:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Demo Crash Service (latest)
        uses: docker/build-push-action@v5
        with:
          context: ./services/demo-crash-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/demo-crash-service:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/demo-crash-service:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
