# ─────────────────────────────────────────────────────────────────────────────
# Project Aegis — CD Pipeline
# Builds and publishes Docker images on tags and releases
# ─────────────────────────────────────────────────────────────────────────────
name: CD

on:
  push:
    tags: ['v*']
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  # ─── Build & Push Docker Images ──────────────────────────────────────────
  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AI Engine
        uses: docker/build-push-action@v7
        with:
          context: ./services/ai-engine
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/ai-engine:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/ai-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Demo Crash Service
        uses: docker/build-push-action@v7
        with:
          context: ./services/demo-crash-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/demo-crash-service:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/demo-crash-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Create GitHub Release ────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: publish-images
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --no-decorate HEAD)
          else
            CHANGES=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Project Aegis ${{ github.ref_name }}
          body: |
            ## Docker Images

            ```bash
            # AI Engine
            docker pull ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/ai-engine:${{ github.ref_name }}

            # Demo Crash Service
            docker pull ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis/demo-crash-service:${{ github.ref_name }}
            ```

            ## Changes

            ${{ steps.changelog.outputs.changes }}

            ## Quick Start

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd aegis
            npm install
            npm run dev:safe
            ```
          generate_release_notes: true

  # ─── Notify ──────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [publish-images, create-release]
    steps:
      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Release notification
        run: |
          echo "✅ Project Aegis ${{ github.ref_name }} released successfully"
          echo "📦 Docker images published to ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/aegis"
          echo "🔗 Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
