# ─────────────────────────────────────────────────────────────────────────────
# Project Aegis — CI Pipeline
# Runs on every push and pull request to main/develop
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.10'

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

  # ─── Build Backend ────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build NestJS backend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: dist/
          retention-days: 7

  # ─── Build CLI ────────────────────────────────────────────────────────────
  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build:cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: dist/cli/
          retention-days: 7

  # ─── Python AI Engine ─────────────────────────────────────────────────────
  build-ai-engine:
    name: Build AI Engine
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/ai-engine/requirements.txt

      - name: Verify Python imports
        run: |
          python -c "from fastapi import FastAPI; print('FastAPI OK')"
          python -c "from sentence_transformers import SentenceTransformer; print('SentenceTransformer OK')"
          python -c "import faiss; print('FAISS OK')"

  # ─── Docker Build (validation only) ──────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-backend, build-cli, build-ai-engine]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build AI Engine image
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-engine
          push: false
          tags: aegis-ai-engine:test

      - name: Build Demo Crash Service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/demo-crash-service
          push: false
          tags: aegis-demo:test

  # ─── Integration Test ─────────────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build-backend, docker-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: dist/

      - name: Start infrastructure
        run: npm run infra:up
        timeout-minutes: 2

      - name: Wait for Kafka
        run: npm run wait:kafka
        timeout-minutes: 1

      - name: Run health checks
        run: |
          sleep 10
          curl -sf http://localhost:3001/ || exit 1
          curl -sf http://localhost:3001/api/health || exit 1
          curl -sf http://localhost:8001/health || exit 1

      - name: Run verify script
        run: npm run verify
        timeout-minutes: 1

      - name: Tear down infrastructure
        if: always()
        run: npm run infra:down
